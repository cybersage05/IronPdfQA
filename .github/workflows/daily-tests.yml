name: IronPDF Daily QA Tests

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 23 * * *'   # 6:00 AM Bangkok (UTC+7)
    - cron: '0 11 * * *'   # 6:00 PM Bangkok (UTC+7)
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test type to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - happy-path
          - edge-cases
          - output-validation
          - performance
          - negative
          - regression
      reason:
        description: 'Reason for manual run'
        required: false
        default: 'Manual trigger'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore packages
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore

    - name: Run all tests
      if: ${{ github.event.inputs.test_type == 'all' || github.event.inputs.test_type == '' || github.event_name != 'workflow_dispatch' }}
      run: dotnet test --no-build --verbosity normal --logger "trx;LogFileName=TestResults.trx" --results-directory "docs/TestResults"

    - name: Run happy path tests only
      if: ${{ github.event.inputs.test_type == 'happy-path' }}
      run: dotnet test --no-build --verbosity normal --filter "Category=HappyPath" --logger "trx;LogFileName=TestResults.trx" --results-directory "docs/TestResults"

    - name: Run edge case tests only
      if: ${{ github.event.inputs.test_type == 'edge-cases' }}
      run: dotnet test --no-build --verbosity normal --filter "Category=EdgeCase" --logger "trx;LogFileName=TestResults.trx" --results-directory "docs/TestResults"

    - name: Run output validation tests only
      if: ${{ github.event.inputs.test_type == 'output-validation' }}
      run: dotnet test --no-build --verbosity normal --filter "Category=OutputValidation" --logger "trx;LogFileName=TestResults.trx" --results-directory "docs/TestResults"

    - name: Run performance tests only
      if: ${{ github.event.inputs.test_type == 'performance' }}
      run: dotnet test --no-build --verbosity normal --filter "Category=Performance" --logger "trx;LogFileName=TestResults.trx" --results-directory "docs/TestResults"

    - name: Run negative tests only
      if: ${{ github.event.inputs.test_type == 'negative' }}
      run: dotnet test --no-build --verbosity normal --filter "Category=Negative" --logger "trx;LogFileName=TestResults.trx" --results-directory "docs/TestResults"

    - name: Run regression tests only
      if: ${{ github.event.inputs.test_type == 'regression' }}
      run: dotnet test --no-build --verbosity normal --filter "Category=HappyPath|Category=OutputValidation" --logger "trx;LogFileName=TestResults.trx" --results-directory "docs/TestResults"

    - name: Configure git
      if: always()
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
      shell: pwsh

    - name: Archive previous run-info.json
      if: always()
      run: |
        if (Test-Path dashboard/run-info.json) {
          $existing = Get-Content dashboard/run-info.json | ConvertFrom-Json
          if ($existing.runNumber -ne "pending") {
            Copy-Item dashboard/run-info.json dashboard/prev-run-info.json
            Write-Host "Previous run archived as prev-run-info.json"
          } else {
            Write-Host "Skipping archive — run-info is still pending"
          }
        }
      shell: pwsh

    - name: Generate real run-info.json
      if: always()
      run: |
        $dotnetVer = (dotnet --version)
        $osVer = [System.Environment]::OSVersion.ToString()
        $cpuCores = [System.Environment]::ProcessorCount.ToString()
        $totalRam = [math]::Round((Get-CimInstance Win32_ComputerSystem).TotalPhysicalMemory / 1GB, 1).ToString()
        $arch = [System.Runtime.InteropServices.RuntimeInformation]::OSArchitecture.ToString()
        $timestamp = (Get-Date -Format "yyyy-MM-dd HH:mm:ss UTC")
        $commitHash = "${{ github.sha }}".Substring(0, 7)
        $trigger = "${{ github.event_name }}"
        $reason = "${{ github.event.inputs.reason }}"
        if (-not $reason) { $reason = "Scheduled run" }
        $testType = "${{ github.event.inputs.test_type }}"
        if (-not $testType) { $testType = "all" }

        $runInfo = @{
          runNumber = "${{ github.run_number }}"
          runId = "${{ github.run_id }}"
          commitHash = $commitHash
          branch = "${{ github.ref_name }}"
          trigger = $trigger
          reason = $reason
          testType = $testType
          timestamp = $timestamp
          os = $osVer
          dotnetVersion = $dotnetVer
          cpuCores = $cpuCores
          totalRamGB = $totalRam
          architecture = $arch
          runner = "GitHub Actions windows-latest"
          ironPdfVersion = "2026.6.1"
          xunitVersion = "2.9.3"
          status = "success"
        } | ConvertTo-Json -Depth 3

        $runInfo | Out-File -FilePath dashboard/run-info.json -Encoding utf8
        Write-Host "run-info.json generated successfully"
      shell: pwsh

    - name: Commit and push run info files
      if: always()
      run: |
        git pull origin main --rebase
        git add dashboard/run-info.json dashboard/prev-run-info.json
        git diff --staged --quiet
        if ($LASTEXITCODE -ne 0) {
          git commit -m "ci: update run info for run #${{ github.run_number }}"
          git push origin main
          Write-Host "Run info committed and pushed"
        } else {
          Write-Host "No changes to commit"
        }
      shell: pwsh

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: docs/TestResults/

    - name: Upload dashboard
      uses: actions/upload-pages-artifact@v3
      with:
        path: dashboard/

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
    steps:
    - name: Deploy to GitHub Pages
      uses: actions/deploy-pages@v4
